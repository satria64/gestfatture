<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}GestFatture{% endblock %}</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.png') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body { background:#f8fafc; }
    .legal-wrap { max-width: 820px; margin: 0 auto; padding: 32px 24px 64px; }
    .legal-wrap h1 { font-size: 1.7rem; }
    .legal-wrap h2 { font-size: 1.15rem; margin-top: 1.6rem; color:#1e3a5f; }
    .legal-wrap h3 { font-size: 1rem; margin-top: 1.1rem; }
    .legal-wrap p, .legal-wrap li { font-size: .95rem; line-height: 1.55; }
    .legal-header { background:#1e3a5f; color:#fff; padding:20px 24px; border-radius:8px 8px 0 0; }
    .legal-header a { color:#fff; }
    .legal-card { background:#fff; padding:28px 32px; border-radius:0 0 8px 8px;
                  box-shadow:0 2px 12px rgba(0,0,0,.05); }
    .legal-footer { text-align:center; margin-top:24px; }
    .legal-footer a { color:#1e3a5f; text-decoration:none; margin:0 .5rem; }
  </style>
</head>
<body>
  <div class="legal-wrap">
    <div class="legal-header d-flex align-items-center justify-content-between">
      <a href="{{ url_for('login') }}" class="text-decoration-none">
        <i class="bi bi-receipt-cutoff me-2"></i>
        <strong>GestFatture</strong>
      </a>
      <span class="small opacity-75">{% block subtitle %}{% endblock %}</span>
    </div>
    <div class="legal-card">
      {% block content %}{% endblock %}
    </div>
    <div class="legal-footer small text-muted mt-3">
      <a href="{{ url_for('privacy') }}">Privacy</a> ·
      <a href="{{ url_for('terms') }}">Termini di servizio</a> ·
      <a href="{{ url_for('login') }}">Accedi</a>
    </div>
  </div>
  {% include '_cookie_banner.html' %}
</body>
</html>
