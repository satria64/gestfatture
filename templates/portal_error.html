<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Link non valido – GestFatture</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>body{background:#f8fafc;display:flex;align-items:center;justify-content:center;min-height:100vh}</style>
</head>
<body>
  <div class="card border-0 shadow-sm" style="max-width:480px">
    <div class="card-body text-center p-5">
      <i class="bi bi-exclamation-triangle fs-1 text-warning"></i>
      <h3 class="mt-3">Link non disponibile</h3>
      <p class="text-muted">{{ reason }}</p>
      <p class="small text-muted mb-0">
        Se il link era stato condiviso da un fornitore, chiedigli di generarne uno nuovo.
      </p>
    </div>
  </div>
</body>
</html>
