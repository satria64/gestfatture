<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Accedi – GestFatture</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body { background:#f1f5f9; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-card { width:100%; max-width:400px; }
    .brand { background:#1e3a5f; color:#fff; border-radius:10px 10px 0 0; padding:28px; text-align:center; }
  </style>
</head>
<body>
  <div class="login-card shadow-lg rounded">
    <div class="brand">
      <i class="bi bi-receipt-cutoff fs-1"></i>
      <h3 class="mt-2 mb-0">GestFatture</h3>
      <p class="mb-0 opacity-75 small">Gestione solleciti automatica</p>
    </div>
    <div class="card border-0 rounded-0 rounded-bottom">
      <div class="card-body p-4">

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
          {% endfor %}
        {% endwith %}

        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-control" autofocus
                     placeholder="admin" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control"
                     placeholder="••••••" required>
            </div>
          </div>
          <div class="mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="remember" id="remember">
              <label class="form-check-label" for="remember">Ricordami</label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i> Accedi
          </button>
        </form>

        <p class="text-muted text-center small mt-3 mb-0">
          Credenziali di default: <strong>admin / admin</strong><br>
          Cambiale subito in Impostazioni dopo il primo accesso.
        </p>
      </div>
    </div>
  </div>
</body>
</html>
